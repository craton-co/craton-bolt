# Per-member nightly pin for the rust-cuda kernel crate.
#
# `rustc_codegen_nvvm` is a codegen backend that links rustc's internal
# crates, so it must be built against the exact nightly it was written for.
# Per docs/rust_cuda/01_toolchain_audit.md, Rust-GPU/Rust-CUDA HEAD on
# 2026-04-29 pins nightly-2026-04-02 with these components.
#
# This file applies ONLY when cargo is invoked from inside `kernels/`.
# `cuda_builder` does exactly that, so the host crate (which lives in
# the parent directory) stays on stable.

[toolchain]
channel    = "nightly-2026-04-02"
components = [
    "rust-src",
    "rustc-dev",
    "llvm-tools-preview",
    "rustfmt",
    "clippy",
]
# The codegen backend handles the nvptx64-nvidia-cuda target via libnvvm;
# we deliberately do NOT add it as a rustup target component because the
# backend supplies its own target spec.
