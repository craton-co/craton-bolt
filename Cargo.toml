[package]
name = "javelin"
version = "0.1.0"
edition = "2021"
description = "JIT-compiled GPU SQL engine — runtime PTX codegen with Rust-tracked CUDA memory safety"
license = "Apache-2.0"

[lib]
name = "javelin"
path = "src/lib.rs"

[dependencies]
arrow = "53"
arrow-array = "53"
arrow-buffer = "53"
arrow-schema = "53"
sqlparser = "0.52"
thiserror = "1"
parking_lot = "0.12"
once_cell = "1"
bytemuck = { version = "1", features = ["derive"] }
libc = "0.2"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
polars = { version = "0.42", default-features = false, features = ["lazy"] }

[features]
default = []
# Stub-mode lets non-CUDA hosts at least compile; real builds use the linked CUDA path.
cuda-stub = []

[build-dependencies]

[[bench]]
name = "query_benchmarks"
harness = false

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
