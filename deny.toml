# deny.toml — cargo-deny configuration for craton-bolt
#
# Run locally:
#     cargo install --locked cargo-deny
#     cargo deny check
#
# CI wires this in via .github/workflows/ — see RELEASING.md.
#
# Schema reference: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false
no-default-features = false
# Only check the host build. The nvptx64 kernels crate has its own
# (much smaller) dep tree and a different toolchain; lint it separately
# if/when we re-include it in workspace.
exclude = []

[licenses]
# Apache-2.0 + MIT is the standard Rust-ecosystem permissive set. We add
# BSD-2-Clause, BSD-3-Clause, ISC, Unicode-DFS-2016 because common transitive
# deps (e.g., regex's `unicode-ident`) ship under them.
version = 2
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
]
# Confidence threshold for LICENSE-file inference. The default 0.8 is fine.
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
# `ring` ships with a mix-and-match license file; this is the standard
# clarification crates use.
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[bans]
# Allow multiple versions of common transitive deps for now (the Rust
# ecosystem is mid-flight on syn 1 → 2, etc.). Tighten over time.
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

# Deny known-bad deps. Empty for now — add entries as advisories surface.
deny = []
skip = []
skip-tree = []

[advisories]
version = 2
# vulnerability advisories: deny (cargo-deny v2 default).
# (cargo-deny v2 reads RUSTSEC database from the cargo-deny database mirror.)
#
# V-11: explicitly set unmaintained/unsound policy rather than relying on
# defaults. The default host graph (all-features=false) is clean, so we make
# these strict. NOTE: the rust-cuda / NVVM build-dependency tree (curl/tar/
# xz 0.1.0/nvvm/rustc_codegen_nvvm) pulls in the known-unmaintained `xz 0.1.0`
# crate; that tree is only scanned by the informational all-features
# cargo-deny job in CI (see .github/workflows/ci.yml), which is
# continue-on-error so this "deny" does not block CI for the rust-cuda graph.
unmaintained = "deny"
unsound = "deny"
yanked = "warn"
ignore = [
    # Add RUSTSEC-XXXX-YYYY ids here only with justification + tracking
    # GH issue. Default is empty.
    #
    # V-11: the rust-cuda build tree contains the unmaintained `xz 0.1.0`
    # crate. We deliberately do NOT add a (possibly fabricated) RUSTSEC id
    # here; instead the all-features cargo-deny CI job is non-blocking
    # (continue-on-error). If/when we want the rust-cuda scan to be blocking,
    # add the confirmed advisory id below.
    # TODO: confirm RUSTSEC id for xz 0.1.0 before ignoring it explicitly.
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
