# deny.toml — cargo-deny configuration for craton-bolt
#
# Run locally:
#     cargo install --locked cargo-deny
#     cargo deny check
#
# CI wires this in via .github/workflows/ — see RELEASING.md.
#
# Schema reference: https://embarkstudios.github.io/cargo-deny/

[graph]
# SCAN SCOPE — read this before relying on the advisory/license gates below.
#
# `cargo deny check` here covers ONLY the DEFAULT feature graph
# (all-features = false, no-default-features = false). The blocking gates in
# [advisories] (`unmaintained = "deny"` etc.) and [licenses] therefore apply
# to the default host build, which is clean.
#
# The OFF-BY-DEFAULT `rust-cuda` feature pulls a much larger build-dependency
# tree (rustc_codegen_nvvm -> ... -> the unmaintained `xz 0.1.0`). That graph
# is scanned SEPARATELY and NON-BLOCKING by the informational
# `cargo-deny-all-features` CI job (`cargo deny --all-features check`, run
# continue-on-error — see .github/workflows/ci.yml). So an advisory that only
# affects the `rust-cuda` graph (e.g. xz 0.1.0; documented in [advisories]
# below) is surfaced for auditors but does NOT block CI, and the `deny`
# policies here stay strict for the default graph rather than being globally
# loosened to accommodate the off-default tree.
all-features = false
no-default-features = false
# Only check the host build. The nvptx64 kernels crate has its own
# (much smaller) dep tree and a different toolchain; lint it separately
# if/when we re-include it in workspace.
exclude = []

[licenses]
# Apache-2.0 + MIT is the standard Rust-ecosystem permissive set. We add
# BSD-2-Clause, BSD-3-Clause, ISC, Unicode-DFS-2016 because common transitive
# deps (e.g., regex's `unicode-ident`) ship under them.
version = 2
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
]
# Confidence threshold for LICENSE-file inference. The default 0.8 is fine.
confidence-threshold = 0.8

[bans]
# Allow multiple versions of common transitive deps for now (the Rust
# ecosystem is mid-flight on syn 1 → 2, etc.). Tighten over time.
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

# Deny known-bad deps. Empty for now — add entries as advisories surface.
deny = []
skip = []
skip-tree = []

[advisories]
version = 2
# vulnerability advisories: deny (cargo-deny v2 default).
# (cargo-deny v2 reads RUSTSEC database from the cargo-deny database mirror.)
#
# V-11: explicitly set unmaintained/unsound policy rather than relying on
# defaults. The default host graph (all-features=false) is clean, so we make
# these strict. NOTE: the rust-cuda / NVVM build-dependency tree (curl/tar/
# xz 0.1.0/nvvm/rustc_codegen_nvvm) pulls in the known-unmaintained `xz 0.1.0`
# crate; that tree is only scanned by the informational all-features
# cargo-deny job in CI (see .github/workflows/ci.yml), which is
# continue-on-error so this "deny" does not block CI for the rust-cuda graph.
unmaintained = "deny"
unsound = "deny"
yanked = "warn"
ignore = [
    # Add RUSTSEC-XXXX-YYYY ids here only with justification + tracking
    # GH issue. Default is empty — i.e. NOTHING is suppressed for the default
    # host graph, which stays strict under `unmaintained = "deny"`.
    #
    # KNOWN & ACCEPTED (does not block CI): unmaintained `xz 0.1.0` reaches the
    # build graph ONLY via the off-default `rust-cuda` feature and is reported
    # only by the non-blocking all-features CI job (see [graph] scope note and
    # the detail below). It is intentionally NOT ignored here, because the
    # default-graph scan never sees it; listing it would have no effect on the
    # default scan and could mask a future default-graph regression.
    #
    # V-11 (reviewed 2026-05-30): the OFF-BY-DEFAULT `rust-cuda` build tree
    # (rustc_codegen_nvvm -> ... -> `xz 0.1.0`) pulls in the unmaintained
    # `xz 0.1.0` crate. This affects ONLY the `--all-features` scan run by the
    # informational, non-blocking `cargo-deny-all-features` CI job; the default
    # host graph (graph.all-features=false) does NOT contain it and stays clean
    # under `unmaintained = "deny"`. We therefore keep this scoped, non-blocking
    # rather than globally loosening `unmaintained`.
    #
    # No RUSTSEC id is listed for the unmaintained `xz 0.1.0` crate here on
    # purpose. The exact advisory id could not be confirmed at the time of
    # writing, and we deliberately do NOT hardcode a guessed/real-looking id:
    # an id that matches nothing makes cargo-deny warn, and an id we cannot
    # verify could silently suppress the wrong advisory. Because the default
    # host graph (graph.all-features=false) never contains `xz 0.1.0`, an
    # ignore entry would have no effect on the blocking default scan anyway —
    # it would only matter to the non-blocking all-features job.
    #
    # TO ENABLE (only if the all-features job is later made blocking): look up
    # the unmaintained-`xz` advisory at https://rustsec.org/advisories/ ,
    # confirm the exact id and that it targets `xz 0.1.0`, then add it below
    # with this justification. Until verified, leave the list empty.
    #   "<RUSTSEC-ID-TO-BE-CONFIRMED>", # xz 0.1.0 (rust-cuda tree); confirm id before enabling
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
