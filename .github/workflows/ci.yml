name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  # Weekly scheduled trigger — drives the allow-failure GPU lane below (the
  # CPU lanes also run, which is harmless). Adjust/remove once a dedicated
  # GPU runner is wired up. Cron is UTC.
  schedule:
    - cron: "0 6 * * 1"
  # Allow maintainers to kick the GPU lane on demand.
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    name: build (${{ matrix.os }}, ${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        toolchain: ["stable", "1.74"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (${{ matrix.toolchain }})
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.toolchain }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.toolchain }}-

      - name: rustfmt check
        if: matrix.os == 'ubuntu-latest' && matrix.toolchain == 'stable'
        run: cargo fmt --all -- --check

      - name: clippy
        if: matrix.os == 'ubuntu-latest' && matrix.toolchain == 'stable'
        run: cargo clippy --lib --tests --features cuda-stub --no-default-features

      - name: cargo check
        run: cargo check --lib --features cuda-stub --no-default-features

      - name: cargo check --features cudarc
        if: matrix.os == 'ubuntu-latest' && matrix.toolchain == 'stable'
        run: cargo check --lib --features cudarc --no-default-features
        env:
          RUSTFLAGS: ""

      # TODO(ci): --features rust-cuda requires nightly + libNVVM + LLVM
      # toolchain — not feasible on github-hosted runners without a custom
      # container. Track in https://github.com/craton-co/craton-bolt/issues/?
      #
      # V-4: enabling rust-cuda makes rustc_codegen_nvvm download & execute an
      # external LLVM/libNVVM toolchain at build time (network fetch + plugin
      # execution, no in-repo integrity check). Off by default; build it only
      # on network-isolated, artifact-pinned runners. See build.rs.

      - name: cargo test (lib + integration)
        run: cargo test --lib --tests --features cuda-stub --no-default-features

      - name: cargo test (doctests)
        if: matrix.os == 'ubuntu-latest' && matrix.toolchain == 'stable'
        run: cargo test --doc --features cuda-stub --no-default-features

  # Host-side coverage (informational, non-blocking for tooling hiccups).
  # Measures HOST coverage under the same --no-default-features --features
  # cuda-stub config the test job uses. We MEASURE and REPORT only: there is
  # intentionally NO minimum-threshold gate — GPU code paths are dark on
  # github-hosted runners (no CUDA device), so a blanket coverage floor would
  # be unrealistic. The lcov report is uploaded as an artifact for inspection.
  #
  # NOTE: `continue-on-error: true` keeps coverage-tooling failures from
  # blocking the pipeline, but the underlying `cargo llvm-cov` run executes
  # the test suite, so a genuine TEST failure still surfaces (red job).
  #
  # FUTURE(ci): a dedicated GPU-runner lane could run
  #   cargo test --features cudarc --no-default-features -- --ignored
  # to exercise the `#[ignore]`-gated GPU tests. No GPU runner exists yet, so
  # this remains a comment rather than a job.
  coverage:
    name: coverage (host, informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-coverage-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.6.16

      # Run the suite once and emit both an lcov file (for upload) and a
      # human-readable summary in the job log.
      - name: cargo llvm-cov (lcov + summary)
        run: |
          cargo llvm-cov --no-default-features --features cuda-stub --lib --lcov --output-path lcov.info
          cargo llvm-cov --no-default-features --features cuda-stub --lib --summary-only

      - name: Upload coverage report (lcov)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          if-no-files-found: warn

      # Optional, non-blocking Codecov upload. Guarded so it is skipped on
      # forks / when no CODECOV_TOKEN secret is configured, and never fails CI.
      - name: Upload to Codecov (optional, non-blocking)
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Supply-chain gate: advisories + licenses + bans, per deny.toml.
  # RELEASING.md documents this as a CI gate, so wire it explicitly here.
  cargo-deny:
    name: cargo deny (advisories + licenses + bans)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-deny-${{ hashFiles('**/Cargo.lock', 'deny.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-deny-

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny

      # `cargo deny check` runs all sections (advisories, licenses, bans,
      # sources) configured in deny.toml at the repo root.
      #
      # V-11: this is the STRICT/BLOCKING gate. It scans the default host
      # graph (deny.toml graph.all-features=false), which is clean, so
      # advisories.unmaintained = "deny" holds here without breaking CI.
      - name: cargo deny check
        run: cargo deny check advisories licenses bans

  # V-11: informational supply-chain scan of the FULL feature graph, including
  # the `rust-cuda` / rustc_codegen_nvvm build-dependency tree (curl/tar/
  # xz 0.1.0/nvvm/...) that the default graph (all-features=false) never sees.
  # This tree contains the known-unmaintained `xz 0.1.0` crate, which would
  # fail under advisories.unmaintained = "deny", so this job is intentionally
  # NON-BLOCKING (continue-on-error: true). Treat its output as advisory: it
  # surfaces NVVM-toolchain dep issues without gating merges. If we ever pin
  # and ignore the specific advisory, this job can be made blocking.
  cargo-deny-all-features:
    name: cargo deny (all-features, informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-deny-all-${{ hashFiles('**/Cargo.lock', 'deny.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-deny-all-

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny

      # `--all-features` overrides deny.toml graph.all-features=false so the
      # rust-cuda / NVVM build-dep tree is included in the scan.
      - name: cargo deny check (all features)
        run: cargo deny --all-features check advisories licenses bans

  # ===========================================================================
  # GPU integration lane (STUB / ALLOW-FAILURE — no GPU runner exists yet).
  # ===========================================================================
  #
  # All other jobs in this file run with `--features cuda-stub` and therefore
  # exercise ZERO real GPU code paths. The `#[ignore]`-gated CUDA integration
  # tests need an actual NVIDIA GPU (compute capability >= 7.0) plus a CUDA
  # Toolkit >= 12 on the runner — neither is available on github-hosted
  # runners.
  #
  # This job is a documented placeholder so the wiring is ready the day a GPU
  # runner is provisioned:
  #
  #   1. Register a self-hosted runner on a GPU box with the labels below
  #      (e.g. `self-hosted, linux, gpu, cuda`).
  #   2. Replace `runs-on: ubuntu-latest` with the commented `runs-on` block.
  #   3. Drop `continue-on-error` / `if: false` once the lane is trusted to be
  #      green, and consider making it a required check on `main`.
  #
  # It is INTENTIONALLY:
  #   * `continue-on-error: true` — never blocks merges while it is a stub, and
  #   * `if: false`               — does not even attempt to run on github-hosted
  #                                 runners (which have no GPU), so it stays a
  #                                 no-op until a maintainer enables it.
  #
  # The real command a GPU runner would execute is shown (and kept honest)
  # below: build the `cudarc` backend and run ONLY the `#[ignore]`d tests.
  gpu-integration:
    name: gpu integration (stub, allow-failure)
    # No GPU runner exists yet, so this never runs in the current setup.
    # Flip to `true` (or delete) once a GPU runner is registered.
    if: false
    continue-on-error: true
    runs-on: ubuntu-latest
    # When a self-hosted GPU runner is available, swap the line above for:
    #   runs-on: [self-hosted, linux, gpu, cuda]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      # On a real GPU runner the CUDA Toolkit (>= 12) and a matching driver
      # must already be installed so `cuda.lib` / `libcuda.so` is on the
      # linker path. The `cudarc` feature links the real CUDA driver API.
      - name: cargo test (GPU, ignored)
        run: |
          # Build + run ONLY the #[ignore]-gated live-GPU integration tests.
          # RUSTFLAGS is cleared because the cudarc tree can carry warnings we
          # do not want to gate the GPU lane on.
          cargo test --features cudarc --no-default-features -- --ignored
        env:
          RUSTFLAGS: ""
